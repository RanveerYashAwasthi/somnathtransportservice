<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Somnath Transport Service</title>
  <desc id="desc">Circular Somnath Transport Service logo with navy arcs and a gold trident.</desc>
  <defs>
