<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <!-- Truck 1: Large semi-truck on right side -->
  <g transform="translate(700, 180)" fill="#ffffff" opacity="0.06">
    <!-- Trailer -->
    <rect x="0" y="0" width="320" height="180" rx="4"/>
    <!-- Cab -->
    <rect x="320" y="60" width="100" height="120" rx="6"/>
    <!-- Cab windshield -->
    <rect x="370" y="70" width="40" height="50" rx="3" fill="#0A2342" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="80" cy="195" r="22"/>
    <circle cx="140" cy="195" r="22"/>
    <circle cx="340" cy="195" r="22"/>
    <circle cx="390" cy="195" r="22"/>
    <!-- Exhaust stack -->
    <rect x="320" y="30" width="8" height="40" rx="3"/>
    <!-- Bumper -->
    <rect x="415" y="160" width="15" height="30" rx="2"/>
  </g>

  <!-- Truck 2: Medium truck on left, slightly behind -->
  <g transform="translate(-30, 220)" fill="#ffffff" opacity="0.04">
    <!-- Trailer -->
    <rect x="0" y="0" width="240" height="150" rx="4"/>
    <!-- Cab -->
    <rect x="240" y="40" width="85" height="110" rx="6"/>
    <!-- Cab windshield -->
    <rect x="280" y="50" width="35" height="42" rx="3" fill="#0A2342" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="60" cy="163" r="18"/>
    <circle cx="110" cy="163" r="18"/>
    <circle cx="260" cy="163" r="18"/>
    <circle cx="300" cy="163" r="18"/>
    <!-- Exhaust stack -->
    <rect x="240" y="15" width="7" height="32" rx="3"/>
  </g>

  <!-- Truck 3: Small truck in background, center-top -->
  <g transform="translate(350, 80) scale(0.6)" fill="#ffffff" opacity="0.03">
    <!-- Trailer -->
    <rect x="0" y="0" width="280" height="160" rx="4"/>
    <!-- Cab -->
    <rect x="280" y="50" width="90" height="110" rx="6"/>
    <!-- Wheels -->
    <circle cx="70" cy="173" r="20"/>
    <circle cx="120" cy="173" r="20"/>
    <circle cx="300" cy="173" r="20"/>
    <circle cx="345" cy="173" r="20"/>
  </g>

  <!-- Road lines at bottom -->
  <rect x="0" y="480" width="1200" height="3" fill="#ffffff" opacity="0.05"/>
  <rect x="50" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
  <rect x="200" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
  <rect x="350" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
  <rect x="500" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
  <rect x="650" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
  <rect x="800" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
  <rect x="950" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
  <rect x="1100" y="510" width="80" height="2" fill="#ffffff" opacity="0.04"/>
</svg>
